services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TAP_CORS_ORIGINS=["http://localhost:5173"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # En produccion el frontend apunta al backend del compose.
      - VITE_API_BASE=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
